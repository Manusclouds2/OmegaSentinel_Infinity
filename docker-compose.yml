version: '3.8'

services:
  omega-core:
    build: .
    container_name: omega-sovereign-core
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SOVEREIGNTY_LEVEL=ABSOLUTE
    networks:
      - omega-net

networks:
  omega-net:
    driver: bridge
